# Paper-recipe 3B tuned for a LOCAL Apple-silicon Mac (M-series, 16GB, MPS).
# bf16 weights + batch_size 1/4 keep it inside 16GB. Expect ~2-4h for the
# resistance pipeline. Run capability SEPARATELY and heavily limited (lm-eval on
# MPS is slow): python scripts/eval_capability.py configs/paper_3b_local.yaml --limit 'mmlu=3,gsm8k_cot=40' Differs from smoke_0.5b in the DATA:
#   * attacks  = data/concepts_paper_small.json — authored concept bank, 6 trained
#     categories + near-OOD members + 2 far-OOD categories (incl. non-English),
#     with NEUTRAL-BASELINE contrast (concept vs "something/stuff/…", SA §B.1).
#   * task     = data/qa.json — easy factual questions the 0.5B actually knows.
# Concept categories are disjoint from question topics, so every injection is
# off-topic by construction (matches the paper's attack design). The efficacy
# gate drops attack directions that don't hijack the base model (expect several
# non-English far-OOD concepts to drop at 0.5B — that's the gate working).
#
# Scale up later: swap concepts_paper_small -> concepts_paper (full 500) and
# qa.json -> qa_open.json (100 open factual Qs) on a 3B/7B run.

model_id: Qwen/Qwen2.5-3B-Instruct
device: auto
dtype: bfloat16       # ~6GB weights on MPS (fp32 3B ~12GB would OOM a 16GB Mac)
seed: 0

# Steering (layer 18 of 36 ~= mid-depth; alpha in units of mean residual norm)
layer: 18
train_alphas: [0.4, 0.6, 0.8]
eval_alphas: [0.4, 0.6, 0.8]
efficacy_alpha: 0.8
efficacy_min_rate: 0.3
n_contrast_pairs: 10

# Data — paper attack bank + easy factual task
qa_source: json
concepts_path: data/concepts_paper_small.json
qa_path: data/qa.json
relevant_frac: 0.6            # moot here: concept cats disjoint from QA -> all off-topic
steered_frac: 0.7
eval_question_frac: 0.2
repeats_per_question: 6
alpaca_replay_frac: 0.5        # paper §3.3: 50% Alpaca replay to preserve general capabilities

# Training
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_targets: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
lr: 1.0e-4
epochs: 1
effective_batch_size: 16
train_batch_size: 1
max_seq_len: 256

# Eval
max_new_tokens: 64
eval_batch_size: 4
bootstrap_resamples: 10000

# Capability retention (scripts/eval_capability.py; needs the [capability] extra)
capability_tasks: {mmlu: 5, gsm8k_cot: 8}
capability_apply_chat_template: true
capability_limit: "mmlu=15,gsm8k_cot=200"    # fast: mmlu limit is PER-SUBJECT (x57 subjects); --limit full for the whole set

# Tracking & backup — null disables; set HF_USER in the Colab launcher to log it
wandb_project: null
wandb_entity: null
hub_repo_id: null
hub_private: true

# Paths — one results/<run>/ per experiment, never shared
vectors_path: results/paper_3b_local/vectors.pt
train_examples_path: results/paper_3b_local/train_examples.json
eval_questions_path: results/paper_3b_local/eval_questions.json
adapter_dir: results/paper_3b_local/m1_resist_adapter
results_dir: results/paper_3b_local
