# CPU smoke config: same pipeline as smoke_0.5b.yaml but sized for a small
# 2-core / 4GB box (tiny batches, one eval alpha, fewer repeats). Slower but
# validates every stage end-to-end where no GPU/MPS exists.

model_id: Qwen/Qwen2.5-0.5B-Instruct
device: cpu
dtype: auto           # fp32 on cpu
seed: 0

# Steering (0.5B-calibrated, same as smoke_0.5b.yaml)
layer: 8
train_alphas: [0.4, 0.6, 0.8]
eval_alphas: [0.8]
efficacy_alpha: 0.8
efficacy_min_rate: 0.3
n_contrast_pairs: 10

# Data
qa_source: json
concepts_path: data/concepts.json
qa_path: data/qa.json
relevant_frac: 0.6
steered_frac: 0.7
eval_question_frac: 0.2
repeats_per_question: 2

# Training
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_targets: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
lr: 1.0e-4
epochs: 1
effective_batch_size: 4
train_batch_size: 2
max_seq_len: 256

# Eval
max_new_tokens: 32
eval_batch_size: 4
bootstrap_resamples: 2000

# Tracking & backup — local only until wandb/hf logins exist on this box
wandb_project: null
wandb_entity: null
hub_repo_id: null
hub_private: true

# Paths
vectors_path: results/smoke_cpu/vectors.pt
train_examples_path: results/smoke_cpu/train_examples.json
eval_questions_path: results/smoke_cpu/eval_questions.json
adapter_dir: results/smoke_cpu/m1_resist_adapter
results_dir: results/smoke_cpu
