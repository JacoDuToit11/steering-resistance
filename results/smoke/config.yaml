# Smoke config: Qwen2.5-0.5B on the handwritten mini-set. Runs end-to-end on a
# laptop (MPS) in ~5 min with batching. Use this to validate the pipeline on a
# new machine before any real experiment.
# NOTE: layer/alphas are 0.5B-calibrated (alpha is in units of mean residual
# norm; alpha=1 already destroys coherence at this scale).

model_id: Qwen/Qwen2.5-0.5B-Instruct
device: auto          # cuda > mps > cpu
dtype: auto           # bf16 on cuda, fp32 otherwise
seed: 0

# Steering
layer: 8
train_alphas: [0.4, 0.6, 0.8]
eval_alphas: [0.4, 0.6, 0.8]
efficacy_alpha: 0.8
efficacy_min_rate: 0.3
n_contrast_pairs: 10

# Data
qa_source: json
concepts_path: data/concepts.json
qa_path: data/qa.json
relevant_frac: 0.6
steered_frac: 0.7
eval_question_frac: 0.2
repeats_per_question: 6

# Training
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_targets: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
lr: 1.0e-4
epochs: 1
effective_batch_size: 16
train_batch_size: 8
max_seq_len: 256

# Eval
max_new_tokens: 64
eval_batch_size: 24
bootstrap_resamples: 10000

# Tracking & backup (PRINCIPLES §9) — null disables; smoke runs stay local
wandb_project: null      # e.g. steering-resistance (wandb login / WANDB_API_KEY)
wandb_entity: null
hub_repo_id: null        # e.g. <hf-user>/steer-smoke (hf auth login / HF_TOKEN)
hub_private: true

# Paths — one results/<run>/ per experiment, never shared
vectors_path: results/smoke/vectors.pt
train_examples_path: results/smoke/train_examples.json
eval_questions_path: results/smoke/eval_questions.json
adapter_dir: results/smoke/m1_resist_adapter
results_dir: results/smoke
